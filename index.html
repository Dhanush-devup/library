<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <script src="script.js" defer></script>
   <link rel="stylesheet" href="styles.css">
  <title>Library</title>
</head>
<body>
    <div class="main">
        <div class="header">
            <h1>Library</h1>
            <p>This is a project for The Odin Project in which I have to make a library using Object Constructors.<br>
                You can also view the <a href="https://github.com/Dhanush-devup/library">Github repository</a> of this project.</p>
        </div>
        <div class="form">
<form id="book">
    <div class="form-group text">
        <label for="title">Book name:</label>
        <input
            type="text"
            id="title"
            name="title"
            placeholder="Atomic Habits"
            required
            minlength="2"
            maxlength="100"
        >
    </div>

    <div class="form-group text">
        <label for="author">Author name:</label>
        <input
            type="text"
            id="author"
            name="author"
            placeholder="Author name"
            required
            minlength="2"
            maxlength="60"
        >
    </div>

    <div class="form-group num">
        <label for="pages">Pages:</label>
        <input
            type="number"
            id="pages"
            name="pages"
            placeholder="300"
            required
            min="1"
            max="10000"
        >
    </div>

    <div class="form-group stat">
        <label for="options">Status:</label>
        <select id="options" name="status" required>
            <option value="read">READ</option>
            <option value="not_read">NOT READ</option>
        </select>
    </div>

    <div class="form-group btt">
        <input type="submit" value="Submit">
    </div>
</form>
        </div>
        <div class="table">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Author</th>
                        <th>Pages</th>
                        <th>Status</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="table_body">

                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
